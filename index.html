<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cover Page Generator</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <!-- html2canvas -->
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wdth,wght@95.4,300..700&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
  <style>
    body {
      background: #f5f5f5;
    }

    /* Cover Page Design */
    #coverPage {
      width: 800px;
      height: 1100px;
      margin: auto;
      background: url('rit_4.png') no-repeat center/contain;
      position: relative;
      padding: 50px;
      color: #000;
      font-family: 'Times New Roman', serif;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    .center-text {
      text-align: center;
    }

    .title {
      font-size: 40px;
      font-weight: bold;
      margin-top: 100px;
    }

    .course_name {
      font-size: 33px;
      font-weight: bold;
      margin-top: 75.5%;
      color: rgb(255, 0, 0);
      letter-spacing: 1px;
      text-transform: uppercase;
      
font-family: "Fredoka", sans-serif;
  font-optical-sizing: auto;
  font-weight: bold;
  font-style: normal;
    }

    .course_code {
      font-size: 25px;
      font-weight: bold;
    position: absolute;
      top: 56.8%;
      left: 53%;
      color: rgb(19, 0, 0);
      letter-spacing: 3px;
      font-family: "Lato", sans-serif;
 
  font-style: normal;
    }

    .info-layer {
      position: absolute;
      inset: 0;
    }

    .field-label {
      font-weight: bold;
      position: absolute;
    }

    .student-value {
      position: absolute;
      top: 78.5%;
      left: 8%;
      color: #0f172a;
      font-size: 30px;
      font-family: "Lato", sans-serif;
  font-weight:bold;
  font-style: normal;
    }

    /* .student-value {
      position: absolute;
     top: 78.5%;
      left: 58%;
      font-size: 24px;
      font-weight: 700;
      color: #1d3557;
    } */

    .reg-value {
      position: absolute;
      top: 922px;
      left: 29%;
      font-size: 23px;
      color: #000000;
      font-family: "Lato", sans-serif;
  font-weight:bold;
  font-style: normal;
    }

    /* .reg-value {
      position: absolute;
      top: 855px;
      left: 290px;
      font-size: 21px;
      font-weight: 600;
      color: #4c1d95;
      letter-spacing: 1px;
    } */

    .lecturer-value {
      position: absolute;
      top: 78.5%;
      left: 55%;
      font-size: 30px;
      color: #000000;
      font-family: "Lato", sans-serif;
  font-weight:bold;
  font-style: normal;
    }

    /* .lecturer-value {
      position: absolute;
      top: 920px;
      left: 290px;
      font-size: 21px;
      font-style: italic;
      color: #064e3b;
    } */
  </style>
</head>

<body>

<div class="container mt-4">

  <div class="row">
    <!-- Form -->
    <div class="col-md-4">
      <h4>Enter Details</h4>

      <input type="text" id="name" class="form-control mb-2" placeholder="Student Name" autocomplete="off">
      <input type="text" id="regNo" class="form-control mb-2" placeholder="Registration Number" autocomplete="off">
      <select id="subjectSelect" class="form-select mb-2" autocomplete="off">
        <option value="">Select Subject</option>
      </select>

      <button id="generate" class="btn btn-primary w-100 mb-2">Generate</button>
      <button id="download" class="btn btn-success w-100">Download PNG</button>
    </div>

    <!-- Preview -->
    <div class="col-md-8">
      <div id="coverPage">

        <div class="center-text">
          <!-- <div class="title">ACADEMIC ASSIGNMENT</div> -->
          <div class="course_name" id="courseText">Course Name</div>
          <div class="course_code" id="codeText">Code</div>
        </div>

        <div class="info-layer">
          <!-- <span class="field-label student-label">Student Name:</span> -->
          <span class="student-value" id="nameText">Your Name</span>

          <!-- <span class="field-label reg-label">Registration No:</span> -->
          <span class="reg-value" id="regNoText">Registration Number</span>

          <!-- <span class="field-label lecturer-label">Lecturer:</span> -->
          <span class="lecturer-value" id="lecturerText">Lecturer Name</span>
        </div>

      </div>
    </div>
  </div>

</div>

<script>
const fallbackSubjects = [
  { code: "MBPC1004", name: "Corporate Finance", lecturer: "Dr. Santanu Das" },
  { code: "MBPC1005", name: "Cost and Management Accounting", lecturer: "Mrs. Snigdha Priyadarshini" },
  { code: "MBPC1006", name: "Human Resources Management", lecturer: "Mr. Uma Sankar Pani" },
  { code: "MBQT1002", name: "Business Research", lecturer: "Mr. Avinash Panda" },
  { code: "MBPC1007", name: "Operations Management", lecturer: "Miss. Rojalin Sahu" },
  { code: "MBPC1008", name: "Business Analytics", lecturer: "Dr. Satyajit Hotta" },
  { code: "MBPC1009", name: "Management Information System", lecturer: "Mr. Jajati Patnaik" },
  { code: "MBPC1010", name: "Strategic Management", lecturer: "Miss. Smita Senapati" },
  { code: "MBEV1202", name: "Health & Wellness", lecturer: "Dr. Santanu Das" },
  { code: "MBPC1011", name: "Introduction to AI", lecturer: "Mr. Avinash Panda" }
];

  let subjects = [];

  function populateSubjects() {
    const $subjectSelect = $("#subjectSelect");
    $subjectSelect.empty();
    $subjectSelect.append('<option value="">Select Subject</option>');

    subjects.forEach((subject, index) => {
      $subjectSelect.append(
        `<option value="${index}">${subject.code} - ${subject.name}</option>`
      );
    });
  }

  function loadSubjects() {
    $.getJSON("subjects.json")
      .done(function (data) {
        subjects = Array.isArray(data.subjects) ? data.subjects : [];
        populateSubjects();
      })
      .fail(function () {
        subjects = fallbackSubjects;
        populateSubjects();
      });
  }

  function getSelectedSubject() {
    const selectedIndex = $("#subjectSelect").val();
    if (selectedIndex === "") {
      return null;
    }

    return subjects[parseInt(selectedIndex, 10)] || null;
  }

  function updatePreview() {
    const selectedSubject = getSelectedSubject();

    $("#nameText").text($("#name").val() || "Your Name");
    $("#regNoText").text($("#regNo").val() || "Registration Number");
    $("#courseText").text(selectedSubject ? selectedSubject.name : "Course Name");
    $("#codeText").text(selectedSubject ? selectedSubject.code : "Code");
    $("#lecturerText").text(selectedSubject ? selectedSubject.lecturer : "Lecturer Name");
  }

  function resetForm() {
    $("#name").val("");
    $("#regNo").val("");
    $("#subjectSelect").val("");
    updatePreview();
  }

  $("#name, #regNo").on("input", function () {
    updatePreview();
  });

  $("#subjectSelect").on("change", function () {
    updatePreview();
  });

  $("#generate").click(function () {
    updatePreview();
  });

  // Download PNG
  $("#download").click(function () {
    html2canvas(document.querySelector("#coverPage")).then(canvas => {
      let link = document.createElement("a");
      link.download = "cover-page.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    });
  });

  loadSubjects();
  resetForm();
</script>

</body>
</html>
